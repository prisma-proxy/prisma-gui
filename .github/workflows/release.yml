name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
  RUST_TOOLCHAIN: stable
  NODE_VERSION: "22"

permissions:
  contents: write

jobs:
  build:
    name: Build / ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
          - label: macOS Universal
            os: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - label: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.rust_targets }}

      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          workspaces: src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build Tauri app
        run: tauri build ${{ matrix.target != 'x86_64-unknown-linux-gnu' && format('--target {0}', matrix.target) || '' }}
        env:
          APPLE_SIGNING_IDENTITY: "-"

      # ── Collect artifacts ──

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $base = "src-tauri/target/x86_64-pc-windows-msvc/release"
          if (Test-Path "$base/prisma-gui.exe") {
            Copy-Item "$base/prisma-gui.exe" "artifacts/prisma-gui-windows-x64.exe"
          }
          $msi = Get-ChildItem "$base/bundle/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) { Copy-Item $msi.FullName "artifacts/Prisma-windows-x64.msi" }
          $nsis = Get-ChildItem "$base/bundle/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsis) { Copy-Item $nsis.FullName "artifacts/Prisma-windows-x64-setup.exe" }
          Get-ChildItem artifacts/

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          BASE="src-tauri/target/universal-apple-darwin/release"
          DMG=$(find "${BASE}/bundle/dmg" -name '*.dmg' 2>/dev/null | head -1)
          [ -n "$DMG" ] && cp "$DMG" artifacts/Prisma-macos-universal.dmg
          APP_BIN="${BASE}/bundle/macos/Prisma.app/Contents/MacOS/Prisma"
          [ -f "$APP_BIN" ] && cp "$APP_BIN" artifacts/prisma-gui-macos-universal
          ls -la artifacts/

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          BASE="src-tauri/target/release"
          DEB=$(find "${BASE}/bundle/deb" -name '*.deb' 2>/dev/null | head -1)
          [ -n "$DEB" ] && cp "$DEB" artifacts/prisma-gui-linux-amd64.deb
          APPIMAGE=$(find "${BASE}/bundle/appimage" -name '*.AppImage' 2>/dev/null | head -1)
          [ -n "$APPIMAGE" ] && cp "$APPIMAGE" artifacts/prisma-gui-linux-amd64.AppImage
          RPM=$(find "${BASE}/bundle/rpm" -name '*.rpm' 2>/dev/null | head -1)
          [ -n "$RPM" ] && cp "$RPM" artifacts/prisma-gui-linux-amd64.rpm
          [ -f "${BASE}/prisma-gui" ] && cp "${BASE}/prisma-gui" artifacts/prisma-gui-linux-amd64 && chmod +x artifacts/prisma-gui-linux-amd64
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gui-${{ matrix.label }}
          path: artifacts/*
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: all-artifacts

      - name: Collect all files
        run: |
          mkdir -p release-files
          find all-artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
